<!DOCTYPE html>
<html lang="pt-BR" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Definitivo — Gravação, Mixagem & Masterização Analógica · PLA v0.1 · Estúdio Plá</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg:        #060F1C;
      --bg-card:   #0C1D31;
      --bg-card2:  #0F2440;
      --blue:      #1A6FBF;
      --blue-lt:   #3A9FEF;
      --blue-glow: rgba(58,159,239,0.18);
      --gold:      #D4A83A;
      --gold-lt:   #F0C84A;
      --txt:       #EAF2FF;
      --txt2:      #7EADD4;
      --border:    #1C3A58;
      --div:       rgba(58,159,239,0.22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'Manrope', system-ui, sans-serif;
      font-size: 18px;
      line-height: 1.7;
    }

    /* ── LANG TOGGLE ───────────────────────── */
    .lang-toggle {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 999;
      display: flex;
      gap: 0;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .lang-btn {
      background: var(--bg-card);
      border: none;
      color: var(--txt2);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 9px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--blue);
      color: #fff;
    }

    .lang-btn:hover:not(.active) {
      background: var(--bg-card2);
      color: var(--txt);
    }

    /* ── VU HEADER ─────────────────────────── */
    header {
      position: relative;
      overflow: hidden;
      padding: 64px 40px 52px;
      text-align: center;
      border-bottom: 1px solid var(--div);
      background: linear-gradient(180deg, #071828 0%, var(--bg) 100%);
    }

    /* ── Rolos v3.1 ── */
    .vu-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
      filter: drop-shadow(0 0 28px rgba(58,159,239,0.12));
    }
    #spool-L {
      transform-origin: 100px 100px;
      animation: ccw 2.8s linear infinite;
      animation-play-state: running;
    }
    #spool-R {
      transform-origin: 300px 100px;
      animation: ccw 2.1s linear infinite;
      animation-play-state: running;
    }
    @keyframes ccw {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    .ebtn { cursor: pointer; }
    .ebtn:hover rect, .ebtn:hover circle, .ebtn:hover polygon {
      filter: brightness(2.2);
    }
    @keyframes vu-idle {
      0%,100% { transform: rotate(-36deg); }
      50%      { transform: rotate(-28deg); }
    }
    .needle-idle {
      animation: vu-idle 1.8s ease-in-out infinite;
      transform-origin: 50px 43px;
    }

    /* ── TIPOGRAFIA ─────────────────────────────────── */
    .eyebrow {
      font-family: 'Manrope', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(30px, 5vw, 62px);
      font-weight: 700;
      line-height: 1.15;
      color: #FFF;
      margin-bottom: 18px;
    }

    h1 em { color: var(--blue-lt); font-style: normal; }

    .subtitle {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(15px, 1.8vw, 19px);
      font-weight: 400;
      color: var(--txt2);
      max-width: 620px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }

    .badges {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--txt2);
    }

    /* ── PLAYER ────────────────────────────── */
    .player {
      background: var(--bg-card);
      border-bottom: 1px solid var(--div);
      padding: 44px 40px;
      text-align: center;
    }

    .player-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
    }

    .key-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .key-input-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
    }

    .key-input {
      width: 100%;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 13px 50px 13px 18px;
      font-size: 16px;
      color: var(--txt);
      outline: none;
      font-family: monospace;
      letter-spacing: 1px;
      transition: border-color 0.2s;
    }

    .key-input:focus { border-color: var(--blue-lt); }
    .key-input::placeholder { color: var(--txt2); font-family: 'Inter', sans-serif; letter-spacing: 0; }

    .key-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--txt2);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      line-height: 1;
    }

    .ai-studio-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--blue-lt);
      font-size: 14px;
      text-decoration: none;
      font-weight: 600;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .ai-studio-link:hover { border-color: var(--blue-lt); background: var(--blue-glow); }

    .key-hint {
      font-size: 13px;
      color: var(--txt2);
      margin-bottom: 28px;
    }

    .voice-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .voice-btn {
      background: transparent;
      border: 2px solid var(--border);
      border-radius: 40px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      color: var(--txt2);
      cursor: pointer;
      transition: all 0.22s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .voice-btn:hover { border-color: var(--blue-lt); color: var(--txt); }

    .voice-btn.active {
      background: var(--blue);
      border-color: var(--blue-lt);
      color: #fff;
      box-shadow: 0 0 22px var(--blue-glow);
    }

    .voice-sub { font-size: 12px; opacity: 0.7; font-weight: 400; }

    .ctrl-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-play {
      background: var(--gold);
      color: #060F1C;
      border: none;
      border-radius: 40px;
      padding: 14px 42px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.22s;
    }

    .btn-play:hover { background: var(--gold-lt); transform: scale(1.03); }
    .btn-play:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-stop {
      background: transparent;
      color: var(--txt2);
      border: 2px solid var(--border);
      border-radius: 40px;
      padding: 14px 30px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.22s;
    }

    .btn-stop:hover { border-color: var(--txt2); color: var(--txt); }

    .player-status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--txt2);
      min-height: 22px;
      font-style: italic;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--txt2);
      border-top-color: var(--blue-lt);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN ──────────────────────────────── */
    main { max-width: 860px; margin: 0 auto; padding: 64px 32px 80px; }

    .block { margin-bottom: 60px; }

    .blk-label {
      font-family: 'Manrope', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .block h2 {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 700;
      color: #FFF;
      line-height: 1.2;
      margin-bottom: 22px;
    }

    .block p {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(16px, 1.6vw, 18px);
      font-weight: 400;
      color: var(--txt);
      line-height: 1.85;
      margin-bottom: 18px;
    }

    /* Citação — centralizada, sem borda lateral */
    .quote-bar {
      text-align: center;
      padding: 32px 40px;
      background: var(--bg-card2);
      border-radius: 12px;
      border: 1px solid rgba(58,159,239,0.18);
      margin: 36px auto;
      max-width: 680px;
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 600;
      font-style: normal;
      color: var(--txt);
      line-height: 1.65;
    }

    .quote-bar::before {
      content: '\201C';
      display: block;
      font-size: 48px;
      line-height: 1;
      color: var(--blue-lt);
      opacity: 0.5;
      margin-bottom: 8px;
      font-family: 'Lora', Georgia, serif;
    }

    hr.div { border: none; border-top: 1px solid var(--div); margin: 0; }

    .vol-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 18px;
      margin-top: 14px;
    }

    .vol-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--blue-lt);
      border-radius: 0 0 12px 12px;
      padding: 26px 22px;
      transition: box-shadow 0.2s;
    }

    .vol-card:hover { box-shadow: 0 0 28px var(--blue-glow); }
    .vol-card.bonus { border-top-color: var(--gold); }

    .vol-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--blue-lt);
      margin-bottom: 8px;
    }

    .vol-card.bonus .vol-num { color: var(--gold); }

    .vol-card h3 {
      font-family: 'Lora', Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      color: #FFF;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .vol-card p {
      font-size: 15px !important;
      color: var(--txt2) !important;
      line-height: 1.6 !important;
      margin: 0 !important;
    }

    .feat-list { list-style: none; display: grid; gap: 14px; margin-top: 14px; }

    .feat-list li {
      display: flex;
      gap: 16px;
      font-family: 'Manrope', sans-serif;
      font-size: clamp(15px, 1.5vw, 17px);
      font-weight: 400;
      line-height: 1.55;
    }

    .feat-ico { color: var(--blue-lt); font-size: 20px; flex-shrink: 0; margin-top: 2px; }

    .cta-block {
      background: linear-gradient(135deg, var(--bg-card2), #091E3A);
      border: 1px solid var(--blue);
      border-radius: 16px;
      padding: 52px 40px;
      text-align: center;
      box-shadow: 0 0 56px rgba(26,111,191,0.14);
    }

    .cta-block h2 {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(24px, 3.5vw, 40px);
      font-weight: 700;
      color: #FFF;
      line-height: 1.2;
      margin-bottom: 18px;
    }

    .cta-block p {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(15px, 1.5vw, 18px);
      font-weight: 400;
      color: var(--txt2);
      max-width: 520px;
      margin: 0 auto 34px;
      line-height: 1.75;
    }

    .cta-btn {
      display: inline-block;
      background: var(--blue-lt);
      color: #060F1C;
      font-weight: 800;
      font-size: 18px;
      padding: 17px 50px;
      border-radius: 48px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.22s;
    }

    .cta-btn:hover { background: #FFF; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(58,159,239,0.38); }

    .cta-note { margin-top: 16px; font-size: 14px; color: var(--txt2); }

    footer {
      text-align: center;
      padding: 28px 40px;
      font-size: 13px;
      color: var(--txt2);
      border-top: 1px solid var(--div);
    }

    footer strong { color: var(--blue-lt); }

    @media (max-width: 600px) {
      header, .player { padding: 44px 20px 36px; }
      main { padding: 44px 20px 64px; }
      .cta-block { padding: 36px 20px; }
      .key-row { flex-direction: column; align-items: stretch; }
      .ai-studio-link { justify-content: center; }
      .lang-toggle { top: 12px; right: 12px; }
    }
  </style>
</head>
<body>

<!-- LANGUAGE TOGGLE -->
<div class="lang-toggle">
  <button class="lang-btn active" id="btnPT" onclick="setLang('pt')">PT</button>
  <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
</div>

<!-- HEADER -->
<header>
  <div class="vu-wrap">
<svg id="main-svg" width="400" height="240" viewBox="0 0 400 240">
<defs>
  <!-- Metálico hub -->
  <radialGradient id="gHubL" cx="38%" cy="30%" r="75%">
    <stop offset="0%"   stop-color="#d0e8f8"/>
    <stop offset="40%"  stop-color="#5a90b8"/>
    <stop offset="75%"  stop-color="#12283e"/>
    <stop offset="100%" stop-color="#060f1c"/>
  </radialGradient>
  <radialGradient id="gHubR" cx="38%" cy="30%" r="75%">
    <stop offset="0%"   stop-color="#d0e8f8"/>
    <stop offset="40%"  stop-color="#5a90b8"/>
    <stop offset="75%"  stop-color="#12283e"/>
    <stop offset="100%" stop-color="#060f1c"/>
  </radialGradient>
  <!-- Aro externo -->
  <radialGradient id="gRim" cx="34%" cy="27%" r="78%">
    <stop offset="0%"   stop-color="#ddeefa"/>
    <stop offset="28%"  stop-color="#7aaac8"/>
    <stop offset="65%"  stop-color="#162840"/>
    <stop offset="100%" stop-color="#060f1c"/>
  </radialGradient>
  <!-- Ouro -->
  <radialGradient id="gGold" cx="40%" cy="33%" r="65%">
    <stop offset="0%"   stop-color="#fff2b0"/>
    <stop offset="48%"  stop-color="#D4A83A"/>
    <stop offset="100%" stop-color="#5a3e08"/>
  </radialGradient>
  <!-- Backlit VU -->
  <radialGradient id="gVU" cx="50%" cy="60%" r="65%">
    <stop offset="0%"  stop-color="#fdf0c0"/>
    <stop offset="70%" stop-color="#c4a040"/>
    <stop offset="100%" stop-color="#6a5010"/>
  </radialGradient>
  <!-- Fita -->
  <linearGradient id="gTape" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#2e1600"/>
    <stop offset="50%" stop-color="#4a2808"/>
    <stop offset="100%" stop-color="#201000"/>
  </linearGradient>
  <!-- Filtros -->
  <filter id="fGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fRed" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ══ FITA ENTRE OS SPOOLS ══ -->
<path d="M 168 76 C 186 68 214 68 232 76"
  fill="none" stroke="url(#gTape)" stroke-width="5.5" stroke-linecap="round"/>
<path d="M 168 75 C 186 67 214 67 232 75"
  fill="none" stroke="#6a3810" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
<path d="M 168 124 C 186 132 214 132 232 124"
  fill="none" stroke="url(#gTape)" stroke-width="5.5" stroke-linecap="round"/>

<!-- Guia-fita (pinch rollers) -->
<circle cx="168" cy="76"  r="4.5" fill="#0c1c2e" stroke="#3A9FEF" stroke-width="0.9"/>
<circle cx="232" cy="76"  r="4.5" fill="#0c1c2e" stroke="#3A9FEF" stroke-width="0.9"/>
<circle cx="168" cy="124" r="4.5" fill="#0c1c2e" stroke="#3A9FEF" stroke-width="0.9"/>
<circle cx="232" cy="124" r="4.5" fill="#0c1c2e" stroke="#3A9FEF" stroke-width="0.9"/>

<!-- ══ CABEÇOTE + EASTER EGG ══ -->
<g filter="url(#fGlow)">
  <!-- Corpo -->
  <rect x="189" y="74" width="22" height="52" rx="3.5"
    fill="#060f1c" stroke="#1A6FBF" stroke-width="1.3"/>

  <!-- BOTÃO STOP — discretíssimo -->
  <g class="ebtn" id="btn-stop">
    <rect x="192" y="78" width="16" height="9" rx="1.5"
      fill="#0a1828" stroke="#1a3a5a" stroke-width="0.7"/>
    <rect x="197" y="80.5" width="5.5" height="4" rx="0.5"
      fill="#1a3a5a" id="i-stop"/>
  </g>

  <!-- BOTÃO PLAY — triângulo sutil -->
  <g class="ebtn" id="btn-play">
    <rect x="192" y="90" width="16" height="11" rx="1.5"
      fill="#0a1828" stroke="#1a3a5a" stroke-width="0.7" id="bg-play"/>
    <polygon points="197,92.5 197,99.5 204,96"
      fill="#2a5880" id="i-play"/>
  </g>

  <!-- BOTÃO REC — ponto vermelho quase escondido -->
  <g class="ebtn" id="btn-rec">
    <rect x="192" y="104" width="16" height="9" rx="1.5"
      fill="#0a1828" stroke="#1a3a5a" stroke-width="0.7" id="bg-rec"/>
    <circle cx="200" cy="108.5" r="2.2"
      fill="#5a1010" id="i-rec"/>
  </g>
</g>

<!-- LED de gravação — entre os VUs, apagado por padrão -->
<circle cx="200" cy="160" r="3.5"
  fill="#180404" stroke="#300808" stroke-width="0.8" id="rec-led"/>

<!-- ══ SPOOL ESQUERDO ══
     Furação estilo símbolo de radioatividade:
     3 pás simétricas (arcos de coroa) com espaços abertos.
     r_inner=20, r_outer=60, pás de 60° centradas em 270°, 30°, 150°.
     O arco interno vai no sentido CW (sweep=1),
     o externo CCW (sweep=0).
-->
<g id="spool-L">
  <!-- Aro externo metalizado -->
  <circle cx="100" cy="100" r="68" fill="url(#gRim)"/>
  <!-- Anel de fita (zona escura onde a fita se enrola) -->
  <circle cx="100" cy="100" r="62" fill="#030a14"/>
  <!-- Brilho aro -->
  <circle cx="100" cy="100" r="66" fill="none"
    stroke="#7aaac8" stroke-width="1" opacity="0.35"/>

  <!-- ── 3 PÁS DE RADIOATIVIDADE (spool L, cx=100 cy=100) ──
       Pá 1: 240°→300° (aponta para cima)
         A=240°: (100+20cos240, 100+20sin240) = (90, 82.68)
         B=300°: (100+20cos300, 100+20sin300) = (110, 82.68)
         C=300°: (100+60cos300, 100+60sin300) = (130, 48.04)
         D=240°: (100+60cos240, 100+60sin240) = (70, 48.04)
       Pá 2: 0°→60° (aponta baixo-direita)
         A=0°:  (120, 100)   B=60°:  (110, 117.32)
         C=60°: (130, 151.96) D=0°:  (160, 100)
       Pá 3: 120°→180° (aponta baixo-esquerda)
         A=120°: (90, 117.32)  B=180°: (80, 100)
         C=180°: (40, 100)     D=120°: (70, 151.96)
  -->
  <path d="M 90 82.68
           A 20 20 0 0 1 110 82.68
           L 130 48.04
           A 60 60 0 0 0 70 48.04 Z"
    fill="#0d1e32" stroke="#1a3a5a" stroke-width="0.8"/>

  <path d="M 120 100
           A 20 20 0 0 1 110 117.32
           L 130 151.96
           A 60 60 0 0 0 160 100 Z"
    fill="#0d1e32" stroke="#1a3a5a" stroke-width="0.8"/>

  <path d="M 90 117.32
           A 20 20 0 0 1 80 100
           L 40 100
           A 60 60 0 0 0 70 151.96 Z"
    fill="#0d1e32" stroke="#1a3a5a" stroke-width="0.8"/>

  <!-- Brilho sutil nas bordas das pás -->
  <path d="M 90 82.68 A 20 20 0 0 1 110 82.68"
    fill="none" stroke="#3a6898" stroke-width="1" opacity="0.5"/>
  <path d="M 120 100 A 20 20 0 0 1 110 117.32"
    fill="none" stroke="#3a6898" stroke-width="1" opacity="0.5"/>
  <path d="M 90 117.32 A 20 20 0 0 1 80 100"
    fill="none" stroke="#3a6898" stroke-width="1" opacity="0.5"/>

  <!-- Hub central metálico -->
  <circle cx="100" cy="100" r="22" fill="url(#gHubL)"/>

  document.getElementById('btnEN').classList.toggle('active', l === 'en');

  /* update all data-i18n elements */
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var key = el.getAttribute('data-i18n');
    if (T[l][key] !== undefined) el.innerHTML = T[l][key];
  });

  /* placeholders */
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el){
    var key = el.getAttribute('data-i18n-placeholder');
    if (T[l][key] !== undefined) el.placeholder = T[l][key];
  });

  /* badges */
  var br = document.getElementById('badgeRow');
  br.innerHTML = '';
  T[l].badges.forEach(function(b){
    var s = document.createElement('span');
    s.className = 'badge';
    s.textContent = b;
    br.appendChild(s);
  });

  /* features */
  var fl = document.getElementById('featList');
  fl.innerHTML = '';
  T[l].feats.forEach(function(f){
    var li = document.createElement('li');
    li.innerHTML = '<span class="feat-ico">' + f[0] + '</span><span>' + f[1] + '</span>';
    fl.appendChild(li);
  });

  /* status reset */
  setStatus(T[l].statusInit);
}

/* ── Rolos v3.1 ── */
(function(){
'use strict';

const spL  = document.getElementById('spool-L');
const spR  = document.getElementById('spool-R');
const led  = document.getElementById('rec-led');

const btnStop = document.getElementById('btn-stop');
const btnPlay = document.getElementById('btn-play');
const btnRec  = document.getElementById('btn-rec');

const bgPlay = document.getElementById('bg-play');
const iPlay  = document.getElementById('i-play');
const bgRec  = document.getElementById('bg-rec');
const iRec   = document.getElementById('i-rec');
const iStop  = document.getElementById('i-stop');

const vnL = document.getElementById('vn-L');
const vnR = document.getElementById('vn-R');

let mode = 'PLAY'; // já inicia em PLAY
let vuTargL = -30, vuTargR = -30;
let vuCurL  = -36, vuCurR  = -36;

// ── Atualiza visual dos botões ──
function applyMode(m) {
  mode = m;

  // Stop
  iStop.setAttribute('fill', m === 'STOP' ? '#3A9FEF' : '#1a3a5a');

  // Play
  bgPlay.setAttribute('fill', m !== 'STOP' ? '#0d2040' : '#0a1828');
  iPlay.setAttribute('fill',  m !== 'STOP' ? '#3A9FEF' : '#2a5880');

  // Rec
  bgRec.setAttribute('fill',   m === 'REC' ? '#2a0808' : '#0a1828');
  bgRec.setAttribute('stroke', m === 'REC' ? '#cc2222' : '#1a3a5a');
  iRec.setAttribute('fill',    m === 'REC' ? '#ff2222' : '#5a1010');
  if (m === 'REC') {
    iRec.setAttribute('filter', 'url(#fRed)');
    led.setAttribute('fill',   '#ff1111');
    led.setAttribute('stroke', '#ff5555');
    led.setAttribute('filter', 'url(#fRed)');
  } else {
    iRec.removeAttribute('filter');
    led.setAttribute('fill',   '#180404');
    led.setAttribute('stroke', '#300808');
    led.removeAttribute('filter');
  }

  // ── Carretéis: pause/play da animação CSS — sem pulo ──
  if (m === 'STOP') {
    spL.style.animationPlayState = 'paused';
    spR.style.animationPlayState = 'paused';
    vnL.classList.add('needle-idle');
    vnR.classList.add('needle-idle');
  } else {
    spL.style.animationPlayState = 'running';
    spR.style.animationPlayState = 'running';
    vnL.classList.remove('needle-idle');
    vnR.classList.remove('needle-idle');
  }
}

btnStop.addEventListener('click', () => applyMode('STOP'));
btnPlay.addEventListener('click', () => applyMode('PLAY'));
btnRec.addEventListener('click',  () => applyMode('REC'));

// Inicia em PLAY imediatamente
applyMode('PLAY');

// ── VU ballistics ──
function vuLoop() {
  if (mode !== 'STOP') {
    const t = Date.now() * 0.001;
    const base = mode === 'REC'
      ? Math.sin(t * 1.3) * 16 + 8
      : Math.sin(t * 1.1) * 12 + 2;
    vuTargL = base + Math.random() * (mode === 'REC' ? 14 : 10);
    vuTargR = base + Math.random() * (mode === 'REC' ? 14 : 10);
  } else {
    vuTargL = -36;
    vuTargR = -36;
  }

  // Ballistics suave (inércia da agulha mecânica)
  const spd = mode === 'STOP' ? 0.05 : 0.25;
  vuCurL += (vuTargL - vuCurL) * spd;
  vuCurR += (vuTargR - vuCurR) * spd;

  const angleL = Math.max(-38, Math.min(32, vuCurL));
  const angleR = Math.max(-38, Math.min(32, vuCurR));

  vnL.style.transform = `rotate(${angleL}deg)`;
  vnR.style.transform = `rotate(${angleR}deg)`;

  requestAnimationFrame(vuLoop);
}

vuLoop();
})();

/* ── AUDIO STATE ──────────────────────────────── */
var voiceName = 'Charon';
var audioCtx  = null;
var audioSrc  = null;
var isPlaying = false;

function setStatus(msg, spinner) {
  var el = document.getElementById('status');
  if (spinner) {
    el.innerHTML = '<span class="spinner"></span>' + msg;
  } else {
    el.textContent = msg;
  }
}

function setLoading(on) {
  document.getElementById('btnPlay').disabled = on;
}

function toggleKey() {
  var inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function setVoice(type) {
  voiceName = type === 'masc' ? 'Charon' : 'Kore';
  document.getElementById('btnM').classList.toggle('active', type === 'masc');
  document.getElementById('btnF').classList.toggle('active', type === 'fem');
  if (isPlaying) stopRelease();
}

/* ── GEMINI TTS ───────────────────────────────── */
async function playRelease() {
  var key = document.getElementById('apiKey').value.trim();
  if (!key) { setStatus(T[lang].statusNoKey); return; }

  stopRelease();
  setLoading(true);
  setStatus(T[lang].statusGen + voiceName + '...', true);

  try {
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=' + key;

    var resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: T[lang].audioText }] }],
        generationConfig: {
          responseModalities: ['AUDIO'],
          speechConfig: {
            voiceConfig: {
              prebuiltVoiceConfig: { voiceName: voiceName }
            }
          }
        }
      })
    });

    var data = await resp.json();

    if (data.error) {
      setStatus('⚠ Gemini: ' + data.error.message);
      setLoading(false);
      return;
    }

    var part = data.candidates[0].content.parts[0];
    var b64  = part.inlineData.data;
    var mime = part.inlineData.mimeType || 'audio/L16;rate=24000';

    await playBuffer(b64, mime);

  } catch(e) {
    setStatus(T[lang].statusErr + e.message);
    setLoading(false);
  }
}

async function playBuffer(b64, mime) {
  var bin = atob(b64);
  var buf = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);

  if (audioCtx) { try { audioCtx.close(); } catch(e){} }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  var audioBuffer;

  if (mime.indexOf('L16') !== -1 || mime.indexOf('pcm') !== -1) {
    var rm = mime.match(/rate=(\d+)/);
    var sr = rm ? parseInt(rm[1]) : 24000;
    var i16 = new Int16Array(buf.buffer);
    var f32 = new Float32Array(i16.length);
    for (var j = 0; j < i16.length; j++) f32[j] = i16[j] / 32768.0;
    audioBuffer = audioCtx.createBuffer(1, f32.length, sr);
    audioBuffer.getChannelData(0).set(f32);
  } else {
    audioBuffer = await audioCtx.decodeAudioData(buf.buffer.slice(0));
  }

  audioSrc = audioCtx.createBufferSource();
  audioSrc.buffer = audioBuffer;
  audioSrc.connect(audioCtx.destination);
  audioSrc.onended = function() {
    isPlaying = false;
    setLoading(false);
    setStatus(T[lang].statusDone);
  };
  audioSrc.start();
  isPlaying = true;
  setLoading(false);
  setStatus(T[lang].statusPlay + voiceName + ' · Gemini AI');
}

function stopRelease() {
  if (audioSrc) { try { audioSrc.stop(); } catch(e){} audioSrc = null; }
  if (audioCtx) { try { audioCtx.close(); } catch(e){} audioCtx = null; }
  isPlaying = false;
  setLoading(false);
  setStatus(T[lang].statusStop);
}

/* ── INIT ─────────────────────────────────────── */
setLang('pt');
