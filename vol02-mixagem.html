<head>

<title>Volume 02 — A Mixagem Analógica | Estúdio Plá</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23060d18'/><text x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='18' font-weight='bold' fill='%23D4A83A'>P</text></svg>"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,600;1,700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#060d18;--bg-card:#0a1628;--bg-card2:#0d1e34;
  --blue:#1A6FBF;--blue-lt:#3A9FEF;--blue-glow:rgba(58,159,239,0.18);
  --gold:#D4A83A;--gold-lt:#F0C84A;
  --txt:#c8daea;--txt2:#7a9ab8;--border:#1C3A58;--div:rgba(58,159,239,0.22);
  --green:#2ECC71;--amber:#E67E22;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Manrope', system-ui, sans-serif;font-size:18px;line-height:1.7;}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:999;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:rgba(6,15,28,0.96);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);flex-wrap:wrap;gap:8px;}
.vol-nav{display:flex;gap:6px;flex-wrap:wrap;}
.vol-link{background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--txt2);cursor:pointer;text-decoration:none;transition:all .2s;}
.vol-link.active{background:var(--blue);border-color:var(--blue-lt);color:#fff;}
.vol-link:hover:not(.active){border-color:var(--blue-lt);color:var(--txt);}
.lang-toggle{display:flex;border:1.5px solid var(--border);border-radius:7px;overflow:hidden;}
.lang-btn{background:var(--bg-card);border:none;color:var(--txt2);font-size:13px;font-weight:700;letter-spacing:1px;padding:8px 15px;cursor:pointer;transition:all .2s;}
.lang-btn.active{background:var(--blue);color:#fff;}
.lang-btn:hover:not(.active){background:var(--bg-card2);color:var(--txt);}
.chap-nav{display:flex;justify-content:center;gap:8px;padding:16px 24px;flex-wrap:wrap;border-bottom:1px solid var(--div);background:var(--bg-card);margin-top:52px;}
.chap-link{background:transparent;border:1px solid var(--border);border-radius:20px;padding:7px 18px;font-size:13px;font-weight:600;color:var(--txt2);cursor:pointer;text-decoration:none;transition:all .2s;}
.chap-link:hover{border-color:var(--blue-lt);color:var(--txt);}
header{padding:56px 40px 56px;text-align:center;border-bottom:1px solid var(--div);background:linear-gradient(180deg,#071828 0%,var(--bg) 100%);}
.vu-wrap{display:flex;justify-content:center;align-items:flex-end;gap:5px;height:48px;margin-bottom:32px;}
.vu-bar{width:7px;border-radius:3px 3px 0 0;animation:vup var(--d) ease-in-out infinite alternate;}
@keyframes vup{from{height:var(--mn);opacity:.45}to{height:var(--mx);opacity:1}}
.vol-badge{display:inline-flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--blue);border-radius:24px;padding:8px 20px;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--blue-lt);margin-bottom:24px;}
h1{font-family:'Lora', Georgia, serif;font-size:clamp(28px,5vw,60px);font-weight:900;line-height:1.1;color:#fff;margin-bottom:16px;}
h1 em{color:var(--blue-lt);font-style:italic;}
.subtitle{font-size:clamp(15px,2vw,20px);color:var(--txt2);max-width:620px;margin:0 auto;font-style:italic;}
.player{background:var(--bg-card);border-bottom:1px solid var(--div);padding:40px;text-align:center;}
.player-title{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:24px;}
.key-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.key-wrap{position:relative;width:100%;max-width:460px;}
.key-input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:13px 50px 13px 18px;font-size:16px;color:var(--txt);outline:none;font-family:'JetBrains Mono',monospace;letter-spacing:1px;transition:border-color .2s;}
.key-input:focus{border-color:var(--blue-lt);}
.key-input::placeholder{color:var(--txt2);font-family:'Manrope', sans-serif;letter-spacing:0;}
.key-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt2);cursor:pointer;font-size:18px;}
.ai-link{display:inline-flex;align-items:center;gap:6px;color:var(--blue-lt);font-size:14px;text-decoration:none;font-weight:600;padding:10px 18px;border:1px solid var(--border);border-radius:8px;transition:all .2s;white-space:nowrap;}
.ai-link:hover{border-color:var(--blue-lt);background:var(--blue-glow);}
.key-hint{font-size:13px;color:var(--txt2);margin-bottom:24px;}
.voice-row{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.voice-btn{background:transparent;border:2px solid var(--border);border-radius:40px;padding:11px 28px;font-size:15px;font-weight:600;color:var(--txt2);cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:8px;}
.voice-btn:hover{border-color:var(--blue-lt);color:var(--txt);}
.voice-btn.active{background:var(--blue);border-color:var(--blue-lt);color:#fff;box-shadow:0 0 20px var(--blue-glow);}
.vsub{font-size:11px;opacity:.7;font-weight:400;}
.ctrl-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
.btn-play{background:var(--gold);color:#060d18;border:none;border-radius:40px;padding:13px 36px;font-size:16px;font-weight:800;cursor:pointer;transition:all .22s;}
.btn-play:hover{background:var(--gold-lt);transform:scale(1.03);}
.btn-play:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-pause{background:transparent;color:var(--txt2);border:2px solid var(--border);border-radius:40px;padding:13px 28px;font-size:16px;font-weight:600;cursor:pointer;transition:all .22s;}
.btn-pause:hover:not(:disabled){border-color:var(--blue-lt);color:var(--txt);}
.btn-pause:disabled{opacity:.4;cursor:not-allowed;}
.btn-stop{background:transparent;color:var(--txt2);border:2px solid var(--border);border-radius:40px;padding:13px 28px;font-size:16px;font-weight:600;cursor:pointer;transition:all .22s;}
.btn-stop:hover{border-color:var(--txt2);color:var(--txt);}
.p-status{margin-top:14px;font-size:14px;color:var(--txt2);min-height:22px;font-style:italic;}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--txt2);border-top-color:var(--blue-lt);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
main{max-width:900px;margin:0 auto;padding:64px 32px 80px;}
.chapter{margin-bottom:80px;scroll-margin-top:80px;}
.chap-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--div);}
.chap-num{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:600;color:var(--blue);opacity:.35;line-height:1;flex-shrink:0;margin-top:4px;}
.chap-eyebrow{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.chap-title{font-family:'Lora', Georgia, serif;font-size:clamp(24px,3.5vw,38px);font-weight:700;color:#fff;line-height:1.2;}
.chap-sub{font-size:16px;color:var(--txt2);margin-top:8px;font-style:italic;}
.body-p{font-size:clamp(16px,1.6vw,18px);color:var(--txt);line-height:1.85;margin-bottom:20px;}
.body-p strong{color:var(--gold);}
.subhead{font-family:'Lora', Georgia, serif;font-size:20px;color:#fff;margin:32px 0 12px;}
.body-list{margin:0 0 20px 0;padding-left:0;list-style:none;}
.body-list li{font-size:clamp(16px,1.6vw,18px);color:var(--txt);line-height:1.85;margin-bottom:10px;padding-left:22px;position:relative;}
.body-list li:before{content:"—";position:absolute;left:0;color:var(--blue-lt);}
.body-list li strong{color:var(--blue-lt);}
.chap-audio-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:32px;}
.chap-play-btn{background:var(--blue);color:#fff;border:none;border-radius:24px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.chap-play-btn:hover:not(:disabled){background:var(--blue-lt);}
.chap-play-btn.playing{background:var(--gold);color:#060d18;}
.chap-dl-btn{background:transparent;border:1.5px solid var(--border);color:var(--txt2);border-radius:24px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.chap-dl-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.chap-play-btn:disabled,.chap-dl-btn:disabled{opacity:.5;cursor:not-allowed;}
.chap-audio-status{font-size:13px;color:var(--txt2);font-style:italic;}
.section-tag{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin:0 0 14px;}
.section-tag.tech{color:var(--blue-lt);margin-top:40px;}
.section-tag.gear{color:var(--gold);margin-top:40px;}
.callout{background:var(--bg-card2);border-left:4px solid var(--blue-lt);border-radius:0 10px 10px 0;padding:20px 24px;margin:28px 0;}
.callout.gold{border-left-color:var(--gold);}
.callout.green{border-left-color:var(--green);}
.callout p{font-size:clamp(15px,1.5vw,17px);color:var(--txt);line-height:1.7;margin:0;}
.callout-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--blue-lt);margin-bottom:8px;}
.callout.gold .callout-label{color:var(--gold);}
.callout.green .callout-label{color:var(--green);}
.tbl-wrap{overflow-x:auto;margin:24px 0;}
table{width:100%;border-collapse:collapse;font-size:clamp(14px,1.4vw,16px);}
thead tr{background:var(--bg-card2);}
thead th{padding:14px 18px;text-align:left;font-weight:700;color:var(--blue-lt);font-size:12px;letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid var(--blue);}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:hover{background:var(--bg-card);}
tbody td{padding:14px 18px;color:var(--txt);line-height:1.5;vertical-align:top;}
tbody td:first-child{color:#fff;font-weight:600;}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;}
.tag-blue{background:rgba(58,159,239,.15);color:var(--blue-lt);}
.tag-gold{background:rgba(212,168,58,.15);color:var(--gold);}
.tag-green{background:rgba(46,204,113,.15);color:var(--green);}
.diagram-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;margin:28px 0;overflow-x:auto;}
.diagram-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;text-align:center;}
svg text{font-family:'Manrope', system-ui, sans-serif;}
.eq-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin:24px 0;}
.eq-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:22px 20px;transition:box-shadow .2s;}
.eq-card:hover{box-shadow:0 0 24px var(--blue-glow);}
.eq-card-type{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.eq-card-name{font-family:'Lora', Georgia, serif;font-size:20px;color:#fff;margin-bottom:12px;}
.eq-card-spec{font-size:14px;color:var(--txt2);line-height:1.65;}
.eq-card-spec strong{color:var(--txt);}
hr.sdiv{border:none;border-top:1px solid var(--div);margin:60px 0;}
.vol-footer{background:var(--bg-card2);border-top:1px solid var(--div);padding:48px 32px;text-align:center;}
.vol-footer h3{font-family:'Lora', Georgia, serif;font-size:clamp(22px,3vw,34px);color:#fff;margin-bottom:16px;}
.vol-footer p{font-size:16px;color:var(--txt2);max-width:580px;margin:0 auto 28px;}
.vol-nav-btns{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.nav-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 30px;border-radius:40px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .22s;border:2px solid var(--border);}
.nav-btn.primary{background:var(--blue-lt);color:#060d18;border-color:var(--blue-lt);}
.nav-btn.primary:hover{background:#fff;transform:translateY(-2px);}
.nav-btn.secondary{color:var(--txt2);}
.nav-btn.secondary:hover{border-color:var(--txt2);color:var(--txt);}
footer{text-align:center;padding:24px 32px;font-size:13px;color:var(--txt2);border-top:1px solid var(--div);}
footer strong{color:var(--blue-lt);}
@media(max-width:600px){
  header{padding:44px 20px 44px;}
  main{padding:44px 20px 64px;}
  .player{padding:32px 20px;}
  .chap-header{flex-direction:column;gap:8px;}
  .chap-num{font-size:32px;}
  .key-row{flex-direction:column;align-items:stretch;}
  .top-bar{padding:8px 12px;}
  .vol-link{padding:6px 10px;font-size:12px;}
}
</style>

  c3sub:"O controle do fluxo de voltagem — quatro tecnologias, quatro personalidades.",
  c3_o1:"Imagine que a voz de um cantor é um rio. Em alguns momentos ela vem forte como uma enxurrada; em outros, fraca como um fio d'água. O compressor é a comporta que controla esse fluxo — ele reduz automaticamente o volume quando o sinal fica forte demais, mantendo tudo num nível mais equilibrado.",
  c3_o2:"Mas o que torna os compressores analógicos fascinantes não é só o que eles fazem, é como fazem. Existem quatro tecnologias completamente diferentes para reduzir esse volume, e cada uma deixa uma impressão sonora única na música. Um compressor óptico faz isso usando luz. Um VCA usa eletricidade pura. Um FET usa transistores de resposta ultrarápida. E um Vari-Mu usa válvulas aquecidas que respondem de forma orgânica e imprevisível.",
  c3sh1:"1. VCA — Amplificador Controlado por Voltagem (SSL G-Bus, dbx 160)",
  c3p1:"O sinal de controle (detector) gera uma voltagem que controla diretamente o ganho de um VCA no caminho do áudio. Resposta extremamente rápida e precisa — ataque mensurável em microssegundos. Transparente quando usado com moderação; agressivo quando forçado.",
  c3l1:"<strong>Uso:</strong> Mix bus, bateria, qualquer fonte que precise de controle rápido e firme",
  c3sh2:"2. FET — Transistor de Efeito de Campo (Urei 1176)",
  c3p2:"O sinal de controle polariza um FET que opera no caminho do áudio. Ataque absurdamente rápido (20 µs mínimo). Distorção harmônica característica quando forçado — harmônicos ímpares que adicionam presença e atitude.",
  c3l2:"<strong>Modo All-Buttons-In:</strong> todos os botões de ratio pressionados simultaneamente criam compressão extremamente agressiva com coloração harmônica rica",
  c3l3:"<strong>Uso:</strong> Vocais com atitude, caixas de bateria, guitarras elétricas",
  c3sh3:"3. Óptico (Teletronix LA-2A, LA-3A)",
  c3p3:"O sinal acende um painel eletroluminescente interno. Quanto mais brilhante a luz, mais a célula T4 fotocondutora reduz a resistência — e o volume cai. O tempo de resposta depende da intensidade luminosa, que depende do programa — compressão 'program-dependent'.",
  c3l4:"Release naturalmente variável: rápido nos ataques curtos, lento nas sustentações longas",
  c3l5:"Impossível de soar agressivo — a luz não responde rápido o suficiente",
  c3l6:"<strong>Uso:</strong> Vocais principais, baixo, qualquer instrumento que exija compressão invisível",
  c3sh4:"4. Vari-Mu (Fairchild 670, Manley Variable Mu)",
  c3p4:"A própria válvula (tubo) altera o ganho à medida que a voltagem de entrada aumenta. O ponto de operação da válvula muda continuamente com o sinal — comportamento orgânico e não-linear.",
  c3l7:"Compressão suave e cremosa com assinatura harmônica valvulada rica",
  c3l8:"Release extremamente lento e musical",
  c3l9:"<strong>Uso:</strong> Barramento estéreo master, subgrupos, masterização",

  sslgbusspec:"<strong>Ratio:</strong> 2:1 a 10:1 · <strong>Ataque:</strong> 0,1 ms a 30 ms · <strong>Release:</strong> 0,1 s a 1,2 s · O compressor de barramento mais usado da história. Cola a mixagem com uma consistência que os engenheiros descrevem como 'fazer tudo soar como um álbum'.",
  urei1176spec:"<strong>Ratio:</strong> 4:1, 8:1, 12:1, 20:1, All-buttons · <strong>Ataque:</strong> 20 µs a 800 µs · <strong>Release:</strong> 50 ms a 1,1 s · O compressor mais gravado da história. Presente em virtualmente todos os clássicos do rock, pop e R&B desde os anos 60.",
  la2aspec:"<strong>Ratio:</strong> Fixo (~3:1 a 10:1 program-dependent) · <strong>Ataque:</strong> ~10 ms · <strong>Release:</strong> ~60 ms (program-dep.) · O compressor de vocal por excelência. Sua célula T4 fotocondutora responde organicamente à música.",
  fairchildspec:"<strong>Ratio:</strong> Variável · <strong>Ataque:</strong> Program-dependent · <strong>Release:</strong> 6 tempos selecionáveis · O compressor mais raro e mais cobiçado da história do áudio. Unidades originais valem entre 30 e 50 mil dólares.",
  // Chapter 4
  c4ey:"Dimensão", c4title:"Espaço e Profundidade",
  c4sub:"Câmaras de eco reais, placas de reverberação e delays de fita — o espaço antes do digital.",
  c4_o1:"Antes dos plug-ins de reverb, criar a sensação de espaço numa gravação exigia engenharia física real. Os estúdios construíam salas inteiras de concreto no subsolo só para capturar o eco. Fabricavam placas de aço do tamanho de uma porta suspensas por molas dentro de caixas de madeira. E usavam máquinas de fita auxiliares apenas para criar ecos controlados.",
  c4_o2:"Esses dispositivos não simulavam espaço. Eles eram espaço. O reverb de uma câmara de eco real é o som das reflexões físicas do ar batendo em paredes de concreto. O reverb de uma placa EMT 140 é o som de uma folha de aço vibrando com a música. Essas assinaturas sonoras têm uma complexidade que ainda hoje inspira os melhores plug-ins do mercado.",
  c4sh1:"Câmaras de Eco (Echo Chambers)",
  c4p1:"Salas dedicadas construídas com paredes de concreto altamente reflexivas (frequentemente revestidas de azulejo). Um alto-falante envia o sinal do console para dentro da sala. Microfones posicionados em pontos específicos captam as reflexões. O resultado é um reverb completamente natural, com densidade e complexidade impossíveis de replicar algoritmicamente.",
  c4l1:"Tempo de decaimento (RT60) fixo pela acústica da sala — nenhum controle de parâmetros",
  c4l2:"Reflexões primárias com caráter único baseado nas dimensões físicas",
  c4l3:"O som das câmaras de eco de Abbey Road, Capitol Studios e Gold Star Studio é parte integral da história do rock e pop",
  c4sh2:"Placas de Reverberação (Plate Reverbs — EMT 140)",
  c4p2:"Uma folha de aço de 2 m × 1,2 m suspensa por molas dentro de uma caixa de madeira isolada. Um transdutor fixado no centro faz o metal vibrar com o sinal de áudio. Captadores nas bordas da placa colhem as vibrações metálicas.",
  c4l4:"Reverb denso e brilhante com ataque rápido e decaimento suave",
  c4l5:"Tempo de decaimento ajustável por um amortecedor físico (damper)",
  c4l6:"Assenta perfeitamente atrás de vozes e caixas de bateria",
  c4l7:"Ainda hoje considerado o padrão de referência para vocais de estúdio",
  c4sh3:"Delays de Fita (Tape Delays — Echoplex, Roland RE-201)",
  c4p3:"O sinal é gravado pelo cabeçote de gravação de uma máquina auxiliar e reproduzido pelo cabeçote de reprodução milissegundos depois. A distância física entre os cabeçotes e a velocidade da fita determinam o tempo do delay. Alimentando a saída de volta para a entrada, cria-se o feedback — ecos que se degradam e saturam a cada repetição.",
  c4l8:"Cada repetição fica levemente mais escura e mais saturada — degradação musical",
  c4l9:"Variação de tempo por mudança de velocidade da fita (wow and flutter intencional)",
  c4l10:"O 'slap delay' de 60–120 ms que define o rockabilly e o early rock and roll",
  c4l11:"Feedback controlado cria efeitos de eco infinito e caos organizado",
  c4cl_label:"Aux Sends e o Roteamento de Efeitos",
  c4cl:"<strong>Pre-Fader:</strong> sinal enviado antes do fader de volume — independente do nível do canal. Ideal para foldback ou efeitos de nível fixo. <strong>Post-Fader:</strong> sinal proporcional ao fader — acompanha os ajustes de volume. Padrão para reverbs e delays de mixagem.",
  eq_plate:"Placa de Reverberação", eq_delay:"Tape Delay", eq_chamber:"Câmara de Eco",
  emt140spec:"<strong>Dimensões:</strong> 244 × 122 cm · <strong>Peso:</strong> ~270 kg · <strong>RT60:</strong> 0,5 s a 5 s (ajustável) · A placa de reverberação mais usada na história do áudio. Presente em Abbey Road, AIR Studios, Hansa Studios.",
  echoplexspec:"<strong>Velocidades:</strong> Variável (20–800 ms) · <strong>Feedback:</strong> Regeneração ajustável · O tape delay mais famoso da história. Usado por Jimmy Page, Eddie Van Halen, Brian May.",
  re201spec:"<strong>Velocidades:</strong> 11 combinações de cabeçotes · Spring reverb integrado · Presente em reggae, dub, krautrock e música eletrônica pioneira. Bob Marley, Can, Tangerine Dream.",
  capitolname:"Câmara de Eco — Capitol Studios",
  capitolspec:"Oito câmaras de eco subterrâneas construídas em 1956. Cada câmara tem dimensões e tempos de decaimento únicos. O som de Frank Sinatra, Nat King Cole, Beach Boys e centenas de clássicos americanos.",
  vf_title:"Próximo: Volume 03 — A Masterização",
  vf_desc:"Com a mixagem finalizada no console, o próximo passo é a masterização — o processo que prepara o som para o meio de reprodução final: o disco de vinil.",
  vf_back:"&#8592; Volume 01 — Captação e Gravação",
  vf_next:"Volume 03 — Masterização &#8594;",
  ft_title:"Manual Definitivo de Gravação, Mixagem e Masterização Analógica — Volume 02",
  ft_rights:"Todos os direitos reservados",
  narration:{
    1:"Capítulo Um. A Arquitetura do Console. Na mixagem analógica, vinte e quatro ou mais canais de voltagem elétrica convergem fisicamente em um único ponto de cobre — o barramento de soma. Não é uma soma matemática. É uma fusão real de correntes elétricas, onde os transformadores e amplificadores de linha interagem de forma não-linear, gerando uma coesão harmônica que engenheiros chamam de cola analógica. Cada canal segue um caminho preciso: da saída da fita, passa pelo insert para processamento externo, pela seção de EQ, pelos envios auxiliares, pelo fader e pelo pan, até chegar ao barramento. O SSL quatro mil G definiu o som do pop e rock dos anos oitenta e noventa com seu compressor de barramento integrado. O Neve oito mil e setenta e oito, com seus módulos mil e setenta e três em cada canal, foi o console dos clássicos do rock britânico. E o API dois mil quatrocentos e oitenta e oito carrega o DNA agressivo do som americano de Nashville e Los Angeles.",
    2:"Capítulo Dois. Equalizadores Analógicos. Equalizar no domínio analógico é modificar a fase do sinal através de circuitos de resistores, capacitores e indutores. O equalizador passivo, como o Pultec EQP-1A, usa bobinas de cobre enroladas em núcleos magnéticos como elemento primário de filtragem. Ele não amplifica — apenas molda. E o resultado é uma curva tão suave e musical que parece impossível de soar errada. O famoso truque do Pultec consiste em boostar e cortar a mesma frequência grave simultaneamente: as curvas não se cancelam perfeitamente, criando um ganho massivo com um corte natural logo acima — peso sem lama. O equalizador paramétrico ativo, como o SSL quatro mil E ou o Neve mil e setenta e três, usa amplificadores para boost e cut precisos, com controle de frequência, ganho e largura de banda. E toda equalização analógica introduz deslocamento de fase — um comportamento visto como problema no digital, mas que no analógico é parte integral do som, contribuindo para a coesão e o caráter da mixagem.",
    3:"Capítulo Três. Compressores Analógicos. O compressor controla a dinâmica do sinal — reduz o volume quando ele ultrapassa um limiar, mantendo tudo num nível coerente. Mas o que diferencia as tecnologias analógicas de compressão é o componente físico usado para realizar essa atenuação, e esse componente define completamente o caráter sonoro. O VCA, como o SSL G-Bus, usa um amplificador controlado por voltagem — resposta rápida, precisa, transparente ou agressiva dependendo do ajuste. O FET, como o Urei mil cento e setenta e seis, usa um transistor de efeito de campo com ataque mínimo de vinte microssegundos — ultrarrápido, com distorção harmônica característica que adiciona presença e atitude. O óptico, como o LA-2A da Teletronix, usa uma célula fotocondutora iluminada por um painel interno — quanto mais forte o sinal, mais brilhante a luz, mais a resistência cai. O resultado é uma compressão dependente do programa que nenhuma outra tecnologia replica. E o Vari-Mu, como o Fairchild seiscentos e setenta, usa a própria válvula para variar o ganho de forma orgânica e não-linear — cremoso, musical, valvulado. Cada tecnologia é uma personalidade distinta. Escolher o compressor certo é escolher como a música vai respirar.",
    4:"Capítulo Quatro. Espaço e Profundidade. Antes dos plug-ins, criar a sensação de espaço numa mixagem exigia física real. As câmaras de eco eram salas de concreto construídas no subsolo dos estúdios — um alto-falante enviava o som para dentro, microfones captavam as reflexões das paredes. O resultado era o espaço mais real possível, com uma complexidade de reflexões que nenhum algoritmo ainda replicou completamente. A placa de reverberação EMT cento e quarenta era uma folha de aço com mais de dois metros de largura, suspensa por molas dentro de uma caixa de madeira. Um transdutor no centro fazia o metal vibrar com a música. Os captadores nas bordas colhiam esse tremor metálico — denso, brilhante, com um ataque rápido e um decaimento suave que assentava perfeitamente atrás de qualquer voz. E o delay de fita usava uma máquina auxiliar para gravar e reproduzir o sinal com um atraso determinado pela distância física entre os cabeçotes. Cada repetição ficava levemente mais escura e saturada — uma degradação musical que plug-ins passam décadas tentando capturar. Esses dispositivos não simulavam espaço. Eles eram espaço."
  }
},

  c1ey:"Structure", c1title:"The Architecture of the Console",
  c1sub:"How 24 channels of voltage merge into one piece of music — the physics of analog summing.",
  c1_o1:"Imagine you have twenty-four musicians playing at the same time in separate rooms. Each one arrives at the console through its own channel — a wire of electrical energy representing that voice, that guitar, that kick drum. The console is the room where all of that energy meets, blends, and becomes one single thing.",
  c1_o2:"But it isn't a digital mix, where a computer adds up numbers. It's a physical mix — real electrical currents fusing together at a single point of copper called the bus. And when that happens, something magical occurs: the iron circuits and transistors interact with each other in ways no algorithm can fully predict. The result has a cohesion, a 'glue,' a sense that every instrument belongs to the same space. Engineers call this 'analog glue.'",
  d1label:"SIGNAL PATH IN THE MIX",
  d1note:"Tape Output → Line In → Insert (Outboard) → EQ + Aux Sends → Fader + Pan → Mix Bus",
  c1p1:"When 24 or 48 channels of voltage converge at the bus, subtle intermodulation occurs in the summing circuits. The transformers and line amplifiers in the master section carry that load, generating:",
  c1sh1:"The Phenomenon of Analog Summing",
  c1l1:"Gentle bus compression",
  c1l2:"Musical intermodulation harmonics",
  c1l3:"Spectral cohesion between the elements of the mix",
  c1l4:"<strong>Input line transformer:</strong> impedance matching, coloration",
  c1l5:"<strong>Insert:</strong> pre-fader send/return point for external processing",
  c1l6:"<strong>Channel EQ:</strong> integrated inline equalization",
  c1l7:"<strong>Aux Sends:</strong> pre-fader sends (foldback, fixed effects) and post-fader sends (reverbs, delays)",
  c1l8:"<strong>Fader, Pan and Subgroups:</strong> volume control, stereo positioning, and channel grouping",
  c1p2:"This phenomenon is the 'sound' of the great consoles — and it's what 'console emulation' plug-ins try to replicate. In digital summing, signals are multiplied by coefficients and added mathematically — a perfect result but without the nonlinear behavior of analog circuits. In analog summing, real currents cross paths in copper — and it is exactly that controlled impurity that generates the 'sound.'",
  eq_console:"Analog Console",
  ssl4000gspec:"<strong>Channels:</strong> 24 to 96 · <strong>Architecture:</strong> VCA with integrated G-Bus Compressor · The console that defined the sound of 80s and 90s pop and rock. Found at Abbey Road, Air Studios, Record Plant. The G-Bus bus compressor is one of the most copied tools in audio history.",
  neve8078spec:"<strong>Channels:</strong> 24 to 48 · <strong>Architecture:</strong> Discrete transistorized with Marinair transformers · The most coveted console in history. Every channel is a complete 1073 module. Used by Led Zeppelin, David Bowie, CSNY, and hundreds of British rock classics.",
  api2488spec:"<strong>Channels:</strong> 24 · <strong>Architecture:</strong> Discrete API 2520 transistor · The console of the American Nashville and Los Angeles sound. Aggressive transient response and present midrange that defined American country and rock in the 70s–80s.",
  c2ey:"Sound Sculpture", c2title:"Analog Equalizers",
  c2sub:"The physics of passive, inductive, and parametric filters — sculpting frequency with iron and copper.",
  c2_o1:"Think of the equalizer as the treble and bass control on your stereo — except incredibly more precise and with a personality of its own. While the knob on your radio simply boosts or cuts frequencies in a generic way, the analog studio equalizer does it using copper coils wound around iron cores, capacitors, and resistors that were designed decades ago and still haven't been surpassed.",
  c2_o2:"The most fascinating part is that equalizing in analog isn't just a matter of more or less. It's a matter of how the circuit sounds while doing it. A 1950s Pultec equalizer adds a weight to the low end that no plug-in can perfectly replicate — because it isn't just about level, it's about how the inductors interact with the music around that frequency.",
  c2sh1:"1. Passive/Inductive Equalizers (Pultec EQP-1A)",
  c2p1:"They use <strong>inductors</strong> (wire coils wound around magnetic cores) as the primary filtering element. They have no active amplifiers at the equalization stage — only a makeup gain stage (tube or transistor) to recover the level loss.",
  c2l1:"Smooth, musical curves — impossible to sound aggressive",
  c2l2:"Pronounced phase shift but musically coherent",
  c2l3:"The famous 'Pultec trick': boosting and cutting the same low frequency simultaneously creates a massive gain with a natural cut just above it — weight without mud",
  c2sh2:"2. Active Parametric Equalizers (Neve 1073 EQ, SSL 4000 E)",
  c2p2:"They use operational amplifiers (op-amps) or transistors for active boost/cut. They offer control over three variables: <strong>Frequency</strong>, <strong>Gain</strong>, and <strong>Q</strong> (bandwidth).",
  c2l4:"Greater surgical precision",
  c2l5:"Faster, more controlled response",
  c2l6:"The SSL 4000 E EQ (black and brown knobs): a few dB already causes an immediate, audible impact",
  c2l7:"The Neve 1073 EQ: three simple bands with intrinsic harmonic coloration",
  c2sh3:"3. Shelf Equalizers and High/Low Filters",
  c2p3:"Shelving filters for work at the extremes of the spectrum. High-pass filters (HPF) to eliminate useless sub-frequencies below 80–100 Hz. Low-pass filters (LPF) to control excessive brightness.",
  c2cl_label:"Phase Shift in Analog Equalization",
  c2cl:"All analog equalization introduces phase shift — the audio signal is slightly delayed at certain frequencies. This behavior, seen as a problem in the digital world, is an integral part of the analog sound. Multiple equalizers in series create unique phase signatures that contribute to the cohesion of the mix.",
  eq_passivo:"Passive/Inductive Equalizer", eq_parametrico:"Parametric Equalizer", eq_mastering:"Mastering Equalizer",
  pultecspec:"<strong>Type:</strong> Passive with inductor · <strong>Low Band:</strong> 20–100 Hz · <strong>High Band:</strong> 3–16 kHz · The most musical equalizer ever built. Original passive circuit from the 1950s. Each unit has a slightly different personality due to inductor variation.",
  neve1073eqspec:"<strong>Bands:</strong> 3 (High shelf, Parametric mid, Low shelf) + HPF · Intrinsic harmonic coloration — equalizing with the 1073 always means adding character on top of frequency. The most-recorded EQ in the history of recorded music.",
  ssl4000espec:"<strong>Bands:</strong> 4 fully parametric + HPF/LPF · Surgical precision with an aggressive character. The 'black knob' EQ on records by Michael Jackson, Phil Collins, and practically all 80s pop and rock.",
  gml8200spec:"<strong>Bands:</strong> 5 parametric with military-precision stepped attenuators · The gold standard for mastering equalization. Minimum adjustments of 0.5 dB with perfect repeatability.",
  c3ey:"Dynamics and Tension", c3title:"Analog Compressors",
  c3sub:"Controlling the flow of voltage — four technologies, four personalities.",
  c3_o1:"Imagine a singer's voice is a river. At times it rushes strong like a flash flood; at others, it trickles weak like a thin stream of water. The compressor is the floodgate that controls that flow — it automatically reduces the volume when the signal gets too strong, keeping everything at a more balanced level.",
  c3_o2:"But what makes analog compressors fascinating isn't just what they do, it's how they do it. There are four completely different technologies for reducing that volume, and each one leaves a unique sonic imprint on the music. An optical compressor does it using light. A VCA uses pure electricity. A FET uses ultra-fast responding transistors. And a Vari-Mu uses heated tubes that respond in an organic, unpredictable way.",
  c3sh1:"1. VCA — Voltage-Controlled Amplifier (SSL G-Bus, dbx 160)",
  c3p1:"The control (detector) signal generates a voltage that directly controls the gain of a VCA in the audio path. Extremely fast and precise response — attack measurable in microseconds. Transparent when used moderately; aggressive when pushed hard.",
  c3l1:"<strong>Use:</strong> Mix bus, drums, any source that needs fast, firm control",
  c3sh2:"2. FET — Field-Effect Transistor (Urei 1176)",
  c3p2:"The control signal biases a FET operating in the audio path. Absurdly fast attack (20 µs minimum). Characteristic harmonic distortion when pushed hard — odd harmonics that add presence and attitude.",
  c3l2:"<strong>All-Buttons-In mode:</strong> pressing all the ratio buttons simultaneously creates extremely aggressive compression with rich harmonic coloration",
  c3l3:"<strong>Use:</strong> Vocals with attitude, snare drums, electric guitars",
  c3sh3:"3. Optical (Teletronix LA-2A, LA-3A)",
  c3p3:"The signal lights up an internal electroluminescent panel. The brighter the light, the more the T4 photoconductive cell reduces resistance — and the volume drops. Response time depends on light intensity, which depends on the program material — 'program-dependent' compression.",
  c3l4:"Naturally variable release: fast on short attacks, slow on long sustains",
  c3l5:"Impossible to sound aggressive — the light doesn't respond fast enough",
  c3l6:"<strong>Use:</strong> Lead vocals, bass, any instrument that calls for invisible compression",
  c3sh4:"4. Vari-Mu (Fairchild 670, Manley Variable Mu)",
  c3p4:"The tube itself changes gain as the input voltage increases. The tube's operating point shifts continuously with the signal — organic, nonlinear behavior.",
  c3l7:"Smooth, creamy compression with a rich tube harmonic signature",
  c3l8:"Extremely slow, musical release",
  c3l9:"<strong>Use:</strong> Stereo master bus, subgroups, mastering",
  th_tipo2:"Type", th_comp:"Component", th_ataque:"Attack", th_carater:"Character", th_app2:"Classic Application",

    2:"Chapter Two. Analog Equalizers. Equalizing in the analog domain is modifying the phase of the signal through circuits of resistors, capacitors, and inductors. The passive equalizer, like the Pultec EQP-1A, uses copper coils wound around magnetic cores as the primary filtering element. It does not amplify — it only shapes. And the result is a curve so smooth and musical that it seems impossible to sound wrong. The famous Pultec trick consists of boosting and cutting the same low frequency simultaneously: the curves do not cancel perfectly, creating a massive gain with a natural cut just above — weight without mud. The active parametric equalizer, like the SSL 4000 E or the Neve 1073, uses amplifiers for precise boost and cut, with control of frequency, gain, and bandwidth. And all analog equalization introduces phase shift — a behavior seen as a problem in the digital domain, but which in analog is an integral part of the sound, contributing to the cohesion and character of the mix.",
    3:"Chapter Three. Analog Compressors. The compressor controls the dynamic range of the signal — it reduces the volume when it exceeds a threshold, keeping everything at a coherent level. But what differentiates analog compression technologies is the physical component used to perform that attenuation, and that component completely defines the sonic character. The VCA, like the SSL G-Bus, uses a voltage-controlled amplifier — fast, precise response, transparent or aggressive depending on the settings. The FET, like the Urei 1176, uses a field-effect transistor with a minimum attack of twenty microseconds — ultrafast, with characteristic harmonic distortion that adds presence and attitude. The optical, like the Teletronix LA-2A, uses a photoconductive cell illuminated by an internal panel — the louder the signal, the brighter the light, the more the resistance drops. The result is a program-dependent compression that no other technology replicates. And the Vari-Mu, like the Fairchild 670, uses the tube itself to vary gain in an organic and nonlinear way — creamy, musical, tube-warm. Each technology is a distinct personality. Choosing the right compressor is choosing how the music will breathe.",

var lang = 'pt';
var voiceName = 'Charon';

function setLang(l){
  lang = l;
  document.getElementById('htmlRoot').lang = l === 'pt' ? 'pt-BR' : 'en-US';
  document.getElementById('btnPT').classList.toggle('active', l === 'pt');
  document.getElementById('btnEN').classList.toggle('active', l === 'en');
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k = el.getAttribute('data-i18n');
    if(T[l][k] !== undefined) el.innerHTML = T[l][k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el){
    var k = el.getAttribute('data-i18n-ph');
    if(T[l][k] !== undefined) el.placeholder = T[l][k];
  });
  if(!isPlaying){ setStatus(T[lang].statusInit); }
  updatePauseBtn();
}

function toggleKey(){ var i = document.getElementById('apiKey'); i.type = i.type==='password'?'text':'password'; }
function setVoice(t){
  voiceName = t==='masc'?'Charon':'Kore';
  document.getElementById('btnM').classList.toggle('active',t==='masc');
  document.getElementById('btnF').classList.toggle('active',t==='fem');
  if(isPlaying) stopAudio();
}

var sessionId = 0;
var stopSignal = null;
var pauseGate = null;
var audioCtx = null;
var currentSource = null;
var isPlaying = false;
var isPaused = false;
var audioCache = {};

function setStatus(msg, spin){
  var el = document.getElementById('pStatus');
  el.innerHTML = spin ? '<span class="spinner"></span>' + msg : msg;
}
function setChapStatus(ch, msg){
  var el = document.getElementById('chapStatus'+ch);
  if(el) el.textContent = msg;
}
function clearChapStatuses(){
  for(var i=1;i<=4;i++) setChapStatus(i,'');
}
function highlightChapter(ch){
  for(var i=1;i<=4;i++){
    var btn = document.getElementById('chapPlayBtn'+i);
    if(btn) btn.classList.toggle('playing', i===ch);
  }
}
function updatePauseBtn(){
  var btn = document.getElementById('btnPauseResume');
  btn.disabled = !isPlaying;
  btn.innerHTML = isPaused ? T[lang].btnResumeLabel : T[lang].btnPauseLabel;
}
function setPlayingUI(playing){
  isPlaying = playing;
  document.getElementById('btnPlayAll').disabled = playing;
  for(var i=1;i<=4;i++){
    var pb = document.getElementById('chapPlayBtn'+i);
    var db = document.getElementById('chapDlBtn'+i);
    if(pb) pb.disabled = playing;
    if(db) db.disabled = playing;
  }
  updatePauseBtn();
  if(!playing) highlightChapter(null);
}

function makeDeferred(){
  var resolveFn, rejectFn;
  var p = new Promise(function(resolve, reject){ resolveFn = resolve; rejectFn = reject; });
  p.catch(function(){});
  return { promise:p, resolve:resolveFn, reject:rejectFn };
}

function resetPlaybackState(){
  sessionId++;
  if(stopSignal){ try{ stopSignal.reject(new Error('stopped')); }catch(e){} }
  if(pauseGate){ try{ pauseGate.resolve(); }catch(e){} }
  if(currentSource){ try{ currentSource.stop(); }catch(e){} }
  if(audioCtx){ try{ audioCtx.close(); }catch(e){} }
  audioCtx = null; currentSource = null;
  stopSignal = null; pauseGate = null;
  isPaused = false;
  setPlayingUI(false);
}

function stopAudio(){
  resetPlaybackState();
  setStatus(T[lang].statusStop);
  clearChapStatuses();
}

function togglePause(){
  if(!isPlaying) return;
  if(!isPaused){
    isPaused = true;
    if(audioCtx) audioCtx.suspend();
    pauseGate = makeDeferred();
    setStatus(T[lang].statusPaused);
  } else {
    isPaused = false;
    if(audioCtx) audioCtx.resume();
    if(pauseGate){ pauseGate.resolve(); pauseGate = null; }
  }
  updatePauseBtn();
}

function fetchChapterAudio(ch, key){
  var text = T[lang].narration[ch];
  return fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key='+encodeURIComponent(key),{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:text}]}],
      generationConfig:{responseModalities:['AUDIO'],speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:voiceName}}}}
    })
  }).then(function(r){ return r.json(); }).then(function(d){
    if(d.error) throw new Error(d.error.message);
    var part = d.candidates[0].content.parts[0];
    var mime = part.inlineData.mimeType || 'audio/L16;rate=24000';
    var rm = mime.match(/rate=(\d+)/);
    var rate = rm ? parseInt(rm[1],10) : 24000;
    return { b64: part.inlineData.data, rate: rate, voice: voiceName };
  });
}

function playBuffer(bufData, mySession, ch){
  return new Promise(function(resolve, reject){
    try{
      var bin = atob(bufData.b64), raw = new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++) raw[i] = bin.charCodeAt(i);
      if(audioCtx){ try{ audioCtx.close(); }catch(e){} }
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      var i16 = new Int16Array(raw.buffer), f32 = new Float32Array(i16.length);
      for(var j=0;j<i16.length;j++) f32[j] = i16[j]/32768;
      var ab = audioCtx.createBuffer(1, f32.length, bufData.rate);
      ab.getChannelData(0).set(f32);
      currentSource = audioCtx.createBufferSource();
      currentSource.buffer = ab;
      currentSource.connect(audioCtx.destination);
      currentSource.onended = function(){ if(mySession === sessionId) resolve(); };
      highlightChapter(ch);
      currentSource.start();
    }catch(e){ reject(e); }
  });
}

async function playSequence(chapters){
  var key = document.getElementById('apiKey').value.trim();
  if(!key){ setStatus(T[lang].statusNoKey); return; }
  resetPlaybackState();
  var mySession = sessionId;
  stopSignal = makeDeferred();
  setPlayingUI(true);
  clearChapStatuses();
  try{
    for(var i=0;i<chapters.length;i++){
      if(mySession !== sessionId) return;
      if(isPaused && pauseGate) await Promise.race([pauseGate.promise, stopSignal.promise]);
      if(mySession !== sessionId) return;

      var ch = chapters[i];
      setStatus(T[lang].statusGen + ch + T[lang].statusGenOf + '4 — ' + voiceName + '...', true);
      setChapStatus(ch, T[lang].statusGen + ch + '...');

      var buf = await Promise.race([fetchChapterAudio(ch, key), stopSignal.promise]);
      if(mySession !== sessionId) return;
      audioCache[ch] = buf;

      setStatus(T[lang].statusPlay + ch + ' · ' + voiceName);
      setChapStatus(ch, T[lang].statusPlay + ch);

      await Promise.race([playBuffer(buf, mySession, ch), stopSignal.promise]);
      if(mySession !== sessionId) return;
      setChapStatus(ch, T[lang].statusDone);
    }
    if(mySession === sessionId){
      setStatus(chapters.length > 1 ? T[lang].statusDoneAll : T[lang].statusDone);
    }
  }catch(e){
    if(mySession === sessionId){ setStatus(T[lang].statusErr + e.message); }
  }finally{
    if(mySession === sessionId) setPlayingUI(false);
  }
}

function pcmBase64ToWavBlob(b64, sampleRate){
  var bin = atob(b64), len = bin.length;
  var pcm = new Uint8Array(len);
  for(var i=0;i<len;i++) pcm[i] = bin.charCodeAt(i);
  var blockAlign = 2, byteRate = sampleRate*blockAlign;
  var buffer = new ArrayBuffer(44 + pcm.length);
  var view = new DataView(buffer);
  function writeStr(offset,str){ for(var i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i)); }
  writeStr(0,'RIFF'); view.setUint32(4, 36+pcm.length, true); writeStr(8,'WAVE');
  writeStr(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true); view.setUint32(28,byteRate,true); view.setUint16(32,blockAlign,true); view.setUint16(34,16,true);
  writeStr(36,'data'); view.setUint32(40,pcm.length,true);
  new Uint8Array(buffer,44).set(pcm);
  return new Blob([buffer], {type:'audio/wav'});
}

function triggerDownload(blob, filename){
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
}

async function downloadChapter(ch){
  var key = document.getElementById('apiKey').value.trim();
  if(!key){ setStatus(T[lang].statusNoKey); return; }
  var dlBtn = document.getElementById('chapDlBtn'+ch);
  try{
    var buf = audioCache[ch];
    if(!buf || buf.voice !== voiceName){
      dlBtn.disabled = true;
      setChapStatus(ch, T[lang].statusDownloading + ch + '...');
      setStatus(T[lang].statusDownloading + ch + '...', true);
      buf = await fetchChapterAudio(ch, key);
      audioCache[ch] = buf;
    }
    var blob = pcmBase64ToWavBlob(buf.b64, buf.rate);
    triggerDownload(blob, 'volume02-capitulo0'+ch+'-'+buf.voice.toLowerCase()+'.wav');
    setChapStatus(ch, T[lang].statusDownloaded + ch + T[lang].statusDownloadedEnd);
    setStatus(T[lang].statusDownloaded + ch + T[lang].statusDownloadedEnd);
  }catch(e){
    setStatus(T[lang].statusErr + e.message);
    setChapStatus(ch, '');
  }finally{
    dlBtn.disabled = isPlaying;
  }
}

setLang('pt');
